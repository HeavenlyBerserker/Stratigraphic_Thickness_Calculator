<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STC geometry schematic</title>
    <script>
      globalThis.STC_LEGEND_LAYOUT = "side";
    </script>
    <script src="geometry-schematic.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }
      canvas#geometryCanvas {
        display: block;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        min-height: 120px;
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
      }
    </style>
  </head>
  <body>
    <canvas id="geometryCanvas" style="display: none"></canvas>
  </body>
</html>
